# ATS FX — IB Gateway + NautilusTrader daemon, PAPER mode.
#
# Runs on the NAS default bridge (home IP). Do NOT attach to the gluetun VPN
# namespace — IBKR flags logins from VPN/datacenter IPs and will pile on 2FA/holds.
#
# docker-compose V1 (Synology): deploy with `sudo docker-compose up -d --build`.
# See DEPLOY.md for the full runbook.

services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: ib-gateway
    restart: unless-stopped
    # Secrets load from .env as a literal env_file (no compose ${} substitution),
    # so passwords with $ or other special characters need NO escaping.
    env_file:
      - .env                         # provides TWS_USERID, TWS_PASSWORD, VNC_SERVER_PASSWORD
    environment:
      TRADING_MODE: paper            # 4002. Flip to live (4001) only after the paper run.
      READ_ONLY_API: "no"            # "no" = allow order placement
      # If this username already has a session elsewhere, take it over rather than hang on
      # the "Existing session detected" dialog (which leaves the gateway unhealthy forever).
      EXISTING_SESSION_DETECTED_ACTION: primary
      # Auto-accept the daemon's incoming API connection. Headless: no one can click the
      # "Accept incoming connection" dialog, so the default (manual) makes the client hang
      # with "Failed to receive server version information". accept = let it in.
      TWS_ACCEPT_INCOMING: accept
      # Daily token-based restart (no credentials needed) — keeps it 24x7.
      AUTO_RESTART_TIME: "11:59 PM"
      # 2FA handling: on a timed-out 2FA, restart and re-prompt rather than die.
      TWOFA_TIMEOUT_ACTION: restart
      RELOGIN_AFTER_TWOFA_TIMEOUT: "yes"
      TIME_ZONE: Asia/Hong_Kong
    ports:
      # Bind to NAS localhost only — never expose IB to the LAN/internet.
      - "127.0.0.1:4002:4002"        # API (paper)
      - "127.0.0.1:5900:5900"        # VNC (reach via SSH tunnel; see DEPLOY.md)
    # No settings volume: the gateway runs ephemeral and IBC rebuilds its config from the env
    # vars above on every start. A mounted volume hits "Permission denied" because the gateway
    # runs as uid 1000 while a fresh volume is root-owned. To add persistence later: create the
    # volume, `docker volume inspect` its Mountpoint, chown it to 1000:1000, then re-add the
    # mount + TWS_SETTINGS_PATH: /home/ibgateway/tws_settings.
    labels:
      - "autoheal=true"              # match your existing autoheal label if it differs
    healthcheck:
      # bash /dev/tcp probe (image is Ubuntu-based, has bash). If your image already
      # defines a healthcheck you can delete this block.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/4002' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 240s             # first login + 2FA can take a few minutes

  fx-daemon:
    build: .
    container_name: ats-fx-daemon
    restart: unless-stopped
    depends_on:
      ib-gateway:
        condition: service_healthy
    env_file:
      - .env                         # provides IB_ACCOUNT_ID
    environment:
      IBG_HOST: ib-gateway           # reach the gateway by its compose service name
      # 4004 = gnzsnz socat port for paper; it relays into the gateway from 127.0.0.1 (TRUSTED).
      # Do NOT use 4002 (the gateway's direct listener) — a container connects as an untrusted
      # external IP and the API handshake fails ("Failed to receive server version information").
      IBG_PORT: "4004"
      STATE_PATH: /state/state.json   # daemon writes the snapshot the bot reads
      TZ: Asia/Hong_Kong
    volumes:
      - ats-state:/state
    labels:
      - "autoheal=true"

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: ats-telegram-bot
    restart: unless-stopped
    env_file:
      - .env                         # TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
    environment:
      STATE_PATH: /state/state.json
      TZ: Asia/Hong_Kong
    volumes:
      - ats-state:/state             # read the daemon's snapshot
    labels:
      - "autoheal=true"

volumes:
  ats-state:        # shared state.json between daemon and bot (both run as root → no uid clash)
