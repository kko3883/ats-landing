# Trading parameters for the Equity Engine.
# Overrides the dataclass defaults in config.py.
# All values are optional — missing keys fall back to Python defaults.

layer1:
  sma_period: 200
  d1_lookback: 300
  min_market_cap: 10_000_000_000
  min_dollar_volume: 100_000_000
  run_at_utc: "14:25"

layer2:
  entry_prob_threshold: 0.65
  forecast_bars: 4
  rsi_period: 14
  atr_period: 14
  volume_z_period: 20
  m15_buffer_bars: 500
  m15_warmup_bars: 3

layer3:
  base_trail_mult: 1.5
  tighten_mult: 0.75
  loosen_mult: 2.0
  tighten_vol_z: 2.5
  loosen_vol_z: -1.5
  micro_lookback: 5
  max_flat_hours: 5.0
  min_move_pct: 0.002
  m1_buffer_bars: 500

risk:
  max_risk_per_trade: 0.01
  max_positions: 5
  daily_loss_limit: 0.03
  pdt_equity_threshold: 25000.0
  pdt_max_day_trades: 3
  pdt_rolling_window_days: 5
  max_gap_atr_mult: 2.0
  open_cooldown_minutes: 5
  slippage: 0.0005