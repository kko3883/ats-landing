# ATS configuration — single source of truth for universes, parameters,
# thresholds (BRIEF.md section 3: config-driven, no magic numbers in code).

data:
  dir: data
  # Earliest bar requested on first ingest. 2005 gives runway for the
  # Thermometer's 2007-present acceptance timeline (BRIEF.md section 5).
  start_date: "2005-01-03"
  # Quality-report thresholds.
  stale_after_days: 5   # calendar days without a new bar before a series is flagged stale
  gap_alert_days: 4     # consecutive-row date gap beyond a normal weekend + holiday

sources:
  fred:
    series:
      # BAA10Y is the long-history credit-stress input (Moody's Baa - 10y UST,
      # daily back to 1986): covers 2008/2020 for the Thermometer + backtests.
      - BAA10Y
      # ICE BofA HY OAS is the purer high-yield measure but FRED now only serves
      # it from 2023-06 (ICE Data Indices licensing). Kept as a recent secondary.
      - BAMLH0A0HYM2
      - DTWEXBGS       # Trade-weighted USD index, broad
  yfinance:
    # Close is split/dividend-adjusted (research wants total-return series);
    # raw prices come from the broker at execution time, not yfinance.
    auto_adjust: true
    tickers:
      - ^VIX
      - ^VIX3M         # NOT ^VXV — that ticker is retired
      - SPY
      - QQQ
      - IWM
      - SGOV
      - BIL
      - GLD
      - FLOT

# Phase 2 — Market Thermometer (regime_detector.py, BRIEF.md section 5).
# Continuous Regime Score in [-100, +100] plus a 4-state flag, with hysteresis.
thermometer:
  timeline_start: "2007-01-01"   # acceptance window the owner eyeballs
  anchor: SPY                    # trading calendar all series are aligned to

  # Volatility score in [0, 100]: how stressed the tape is. Blend of VIX term
  # structure, SPY realized-vol percentile, and a long-history credit proxy.
  vol:
    realized_vol_window: 20
    percentile_window: 252
    percentile_min_samples: 60
    # VIX/VIX3M: <= contango_ratio scores 0 stress, >= backwardation scores 100.
    contango_ratio: 0.92
    backwardation_ratio: 1.05
    credit_series: BAA10Y
    credit_z_window: 252
    credit_z_hot: 2.5            # credit z at/above this scores 100 stress
    weights:                    # must sum to 1.0
      term_structure: 0.45
      realized_vol: 0.40
      credit: 0.15

  # Trend score: sign = direction, magnitude = strength. Both methods built
  # (BRIEF.md "implement both; research decides"); `method` selects the driver.
  trend:
    method: momentum            # momentum | adx
    assets: [SPY, QQQ]
    momentum_horizons: [63, 126, 252]
    momentum_z_window: 252
    adx_window: 14
    adx_scale: 25.0             # adx-method only: divides signed ADX before tanh
    score_scale: 1.2           # divides the trend metric before tanh -> [-100,100]
    # ADX (avg over assets) at/above this confirms a trend. Below it, only a
    # strong momentum reading (thresholds.strong_trend) still counts as trend;
    # otherwise the day is range/chop.
    adx_range_ceiling: 20.0

  thresholds:
    bull: 10                    # trending + regime_score >= bull  -> CLEAR_TREND_BULL
    bear: -10                   # trending + regime_score <= bear  -> CLEAR_TREND_BEAR
    strong_trend: 50            # |regime_score| >= this counts as trend even if ADX is low
    shock_vol_score: 70         # vol_score >= this      -> SYSTEMIC_SHOCK (overrides)

  # State transitions need this many consecutive confirming days before the
  # official state flips (anti-whipsaw, BRIEF.md section 5).
  hysteresis_days: 5
